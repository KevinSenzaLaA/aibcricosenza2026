<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campagna AIB 2026 - Croce Rossa Italiana, Comitato di Cosenza</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<header>
<h1>Meteo Area di Cosenza</h1>
</header>

<div id="info">
<div class="card">
<h3>Temperatura</h3>
<p id="temp">-- °C</p>
</div>

<div class="card">
<h3>Vento</h3>
<p id="vento">-- km/h</p>
</div>

<div class="card">
<h3>Direzione</h3>
<p id="direzione">--</p>
</div>

<div class="card">
<h3>Umidità</h3>
<p id="umidita">-- %</p>
</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
